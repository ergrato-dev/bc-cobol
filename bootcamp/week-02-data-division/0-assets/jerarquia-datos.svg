<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 420" fill="none">
  <defs>
    <style>
      text { font-family: Inter, Roboto, sans-serif; }
      .code { font-family: 'Courier New', monospace; font-size: 11px; }
    </style>
  </defs>
  <rect width="650" height="420" fill="#0D1B2A"/>

  <!-- Título -->
  <text x="325" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#42A5F5">JERARQUÍA DE DATOS EN COBOL</text>
  <text x="325" y="54" text-anchor="middle" font-size="12" fill="#78909C">Niveles 01 → 05 → 10</text>

  <!-- Nivel 01: Registro -->
  <rect x="175" y="75" width="300" height="40" rx="6" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="325" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">01 CLIENTE (Grupo)</text>

  <!-- Líneas verticales -->
  <line x1="325" y1="115" x2="325" y2="135" stroke="#1565C0" stroke-width="2"/>
  <line x1="260" y1="135" x2="100" y2="135" stroke="#1565C0" stroke-width="2"/>
  <line x1="325" y1="135" x2="325" y2="155" stroke="#1565C0" stroke-width="2"/>
  <line x1="390" y1="135" x2="550" y2="135" stroke="#1565C0" stroke-width="2"/>

  <!-- Nivel 05: ID -->
  <rect x="75" y="140" width="140" height="35" rx="5" fill="#1A237E" stroke="#283593" stroke-width="1.5"/>
  <text x="145" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#90CAF9">05 ID</text>

  <!-- Nivel 05: Nombre (subgrupo) -->
  <rect x="250" y="160" width="150" height="35" rx="5" fill="#1A237E" stroke="#283593" stroke-width="1.5"/>
  <text x="325" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#90CAF9">05 NOMBRE (Grupo)</text>

  <!-- Nivel 05: Saldo -->
  <rect x="460" y="140" width="140" height="35" rx="5" fill="#1A237E" stroke="#283593" stroke-width="1.5"/>
  <text x="530" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#90CAF9">05 SALDO</text>

  <!-- Líneas desde NOMBRE -->
  <line x1="280" y1="195" x2="170" y2="195" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="370" y1="195" x2="480" y2="195" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="170" y1="195" x2="170" y2="215" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="480" y1="195" x2="480" y2="215" stroke="#1565C0" stroke-width="1.5"/>

  <!-- Nivel 10: Primer nombre -->
  <rect x="100" y="220" width="140" height="35" rx="5" fill="#263238" stroke="#37474F" stroke-width="1"/>
  <text x="170" y="242" text-anchor="middle" font-size="11" fill="#78909C">10 PRIMER-NOMBRE</text>

  <!-- Nivel 10: Apellido -->
  <rect x="410" y="220" width="140" height="35" rx="5" fill="#263238" stroke="#37474F" stroke-width="1"/>
  <text x="480" y="242" text-anchor="middle" font-size="11" fill="#78909C">10 APELLIDO</text>

  <!-- Leyenda -->
  <rect x="40" y="290" width="570" height="115" rx="6" fill="#1A2332" stroke="#263238" stroke-width="1"/>

  <text x="60" y="315" font-size="12" font-weight="700" fill="#42A5F5">Niveles</text>
  <text x="60" y="335" font-size="11" fill="#90A4AE">
    <tspan fill="#42A5F5">01</tspan>  = Registro completo (raíz del árbol)
  </text>
  <text x="60" y="352" font-size="11" fill="#90A4AE">
    <tspan fill="#42A5F5">05</tspan>  = Subgrupos (secciones lógicas)
  </text>
  <text x="60" y="369" font-size="11" fill="#90A4AE">
    <tspan fill="#42A5F5">10</tspan>  = Elementos atómicos (con PIC)
  </text>
  <text x="60" y="390" font-size="11" fill="#78909C">El número exacto no importa, solo la jerarquía. Convención: incrementos de 5.</text>

  <!-- Conexión tipo árbol -->
  <text x="500" y="335" font-size="11" fill="#546E7A">Elemental</text>
  <text x="500" y="355" font-size="11" fill="#546E7A">Grupo (con subordinados)</text>
</svg>
