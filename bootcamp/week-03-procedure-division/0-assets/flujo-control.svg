<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" fill="none">
  <defs><style>text { font-family: Inter, Roboto, sans-serif; }</style></defs>
  <rect width="600" height="340" fill="#0D1B2A"/>

  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#42A5F5">FLUJO DE CONTROL EN COBOL</text>
  <text x="300" y="49" text-anchor="middle" font-size="11" fill="#78909C">IF/ELSE vs EVALUATE vs PERFORM</text>

  <!-- IF -->
  <rect x="25" y="70" width="170" height="200" rx="8" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#42A5F5">IF / ELSE</text>
  <text x="110" y="122" text-anchor="middle" font-size="10" fill="#90A4AE">Decisión simple o anidada</text>
  <text x="35" y="148" font-size="10" fill="#78909C">✓ 1-2 condiciones</text>
  <text x="35" y="165" font-size="10" fill="#78909C">✓ AND / OR / NOT</text>
  <text x="35" y="182" font-size="10" fill="#78909C">✓ 88-level para legibilidad</text>
  <text x="35" y="199" font-size="10" fill="#78909C">✓ ELSE para valor default</text>
  <text x="35" y="220" font-size="10" fill="#FF7043">✗ Anidado profundo</text>

  <!-- EVALUATE -->
  <rect x="215" y="70" width="170" height="200" rx="8" fill="#1A237E" stroke="#1565C0" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#42A5F5">EVALUATE</text>
  <text x="300" y="122" text-anchor="middle" font-size="10" fill="#90A4AE">Decisión múltiple o true</text>
  <text x="225" y="148" font-size="10" fill="#78909C">✓ Múltiples WHEN</text>
  <text x="225" y="165" font-size="10" fill="#78909C">✓ ALSO para multi-sujeto</text>
  <text x="225" y="182" font-size="10" fill="#78909C">✓ WHEN OTHER default</text>
  <text x="225" y="199" font-size="10" fill="#78909C">✓ EVALUATE TRUE (rangos)</text>
  <text x="225" y="220" font-size="10" fill="#78909C">✓ Código más legible</text>
  <text x="225" y="240" font-size="10" fill="#42A5F5">✓ Ideal para > 2 ramas</text>

  <!-- PERFORM -->
  <rect x="405" y="70" width="170" height="200" rx="8" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="490" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#42A5F5">PERFORM</text>
  <text x="490" y="122" text-anchor="middle" font-size="10" fill="#90A4AE">Repetición e iteración</text>
  <text x="415" y="148" font-size="10" fill="#78909C">✓ Párrafos reutilizables</text>
  <text x="415" y="165" font-size="10" fill="#78909C">✓ TIMES: N repeticiones</text>
  <text x="415" y="182" font-size="10" fill="#78909C">✓ UNTIL: con condición</text>
  <text x="415" y="199" font-size="10" fill="#78909C">✓ VARYING: for loop</text>
  <text x="415" y="220" font-size="10" fill="#78909C">✓ EXIT PERFORM: break</text>
  <text x="415" y="240" font-size="10" fill="#42A5F5">✓ TEST AFTER: do-while</text>

  <!-- Líneas de flujo -->
  <line x1="195" y1="120" x2="215" y2="120" stroke="#1565C0" stroke-width="1"/>
  <line x1="385" y1="120" x2="405" y2="120" stroke="#1565C0" stroke-width="1"/>

  <!-- Recomendación -->
  <rect x="25" y="290" width="550" height="35" rx="6" fill="#263238" stroke="#37474F" stroke-width="1"/>
  <text x="300" y="313" text-anchor="middle" font-size="11" fill="#78909C">
    2 ramas: IF/ELSE &nbsp;|&nbsp; 3+ ramas: EVALUATE &nbsp;|&nbsp; Repetición: PERFORM &nbsp;|&nbsp; DO-WHILE: TEST AFTER
  </text>
</svg>
