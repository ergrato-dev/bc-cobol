<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <defs><style>text { font-family: Inter, Roboto, sans-serif; }</style></defs>
  <rect width="600" height="300" fill="#0D1B2A"/>

  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#42A5F5">FLUJO DE PROCESAMIENTO SECUENCIAL</text>

  <!-- Apertura -->
  <rect x="30" y="55" width="160" height="45" rx="6" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="110" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">OPEN INPUT</text>
  <text x="110" y="92" text-anchor="middle" font-size="9" fill="#90A4AE">archivo.dat</text>

  <!-- Flecha -->
  <polygon points="190,78 200,73 200,83" fill="#1565C0"/>

  <!-- Loop READ -->
  <rect x="205" y="55" width="180" height="45" rx="6" fill="#1A237E" stroke="#1565C0" stroke-width="2"/>
  <text x="295" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">READ ... AT END?</text>
  <text x="295" y="92" text-anchor="middle" font-size="9" fill="#90A4AE">Siguiente registro</text>

  <!-- Flecha superior (NO → procesar) -->
  <path d="M295 100 L295 135 L220 135" stroke="#4CAF50" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4CAF50"/></marker></defs>

  <!-- Procesar -->
  <rect x="30" y="130" width="180" height="45" rx="6" fill="#263238" stroke="#37474F" stroke-width="1.5"/>
  <text x="120" y="152" text-anchor="middle" font-size="11" fill="#90CAF9">NOT AT END: Procesar</text>
  <text x="120" y="168" text-anchor="middle" font-size="9" fill="#78909C">Validar → Transformar → WRITE</text>

  <!-- Retorno al READ -->
  <path d="M30 153 L20 153 L20 78 L205 78" stroke="#1565C0" stroke-width="1" fill="none" stroke-dasharray="4 3"/>

  <!-- Flecha SI (EOF → CLOSE) -->
  <path d="M385 78 L420 78 L420 153 L400 153" stroke="#FF7043" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
  <defs><marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#FF7043"/></marker></defs>
  <text x="438" y="75" font-size="9" fill="#FF7043">EOF</text>

  <!-- Cierre -->
  <rect x="395" y="148" width="160" height="45" rx="6" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="475" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">CLOSE archivo</text>
  <text x="475" y="185" text-anchor="middle" font-size="9" fill="#90A4AE">Liberar recursos</text>

  <!-- FILE STATUS -->
  <rect x="130" y="220" width="340" height="50" rx="6" fill="#1A2332" stroke="#263238" stroke-width="1"/>
  <text x="300" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#42A5F5">FILE STATUS = Variable de 2 bytes</text>
  <text x="300" y="258" text-anchor="middle" font-size="10" fill="#78909C">00 = OK &nbsp;|&nbsp; 10 = EOF &nbsp;|&nbsp; 35 = No encontrado &nbsp;|&nbsp; 37 = Permiso denegado</text>
</svg>
