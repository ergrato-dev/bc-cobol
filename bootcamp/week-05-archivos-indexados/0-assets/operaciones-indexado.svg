<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 310" fill="none">
  <defs><style>text { font-family: Inter, Roboto, sans-serif; }</style></defs>
  <rect width="580" height="310" fill="#0D1B2A"/>

  <text x="290" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#42A5F5">ARCHIVO INDEXADO — OPERACIONES</text>
  <text x="290" y="46" text-anchor="middle" font-size="11" fill="#78909C">DYNAMIC ACCESS MODE</text>

  <!-- Archivo indexado (centro) -->
  <rect x="200" y="70" width="180" height="40" rx="8" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="290" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">CATALOGO.IDX</text>

  <!-- START -->
  <rect x="30" y="65" width="130" height="35" rx="5" fill="#1A237E" stroke="#283593" stroke-width="1"/>
  <text x="95" y="87" text-anchor="middle" font-size="10" fill="#90CAF9">START KEY >= id</text>
  <line x1="160" y1="82" x2="200" y2="85" stroke="#1565C0" stroke-width="1"/>

  <!-- READ -->
  <rect x="430" y="65" width="130" height="35" rx="5" fill="#1A237E" stroke="#283593" stroke-width="1"/>
  <text x="495" y="87" text-anchor="middle" font-size="10" fill="#90CAF9">READ KEY IS id</text>
  <line x1="380" y1="85" x2="430" y2="82" stroke="#1565C0" stroke-width="1"/>

  <!-- READ NEXT (abajo) -->
  <rect x="200" y="145" width="180" height="35" rx="5" fill="#263238" stroke="#37474F" stroke-width="1"/>
  <text x="290" y="167" text-anchor="middle" font-size="10" fill="#90CAF9">READ NEXT RECORD</text>
  <line x1="290" y1="110" x2="290" y2="145" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- WRITE (izquierda) -->
  <rect x="35" y="180" width="120" height="35" rx="5" fill="#1B5E20" stroke="#2E7D32" stroke-width="1"/>
  <text x="95" y="200" text-anchor="middle" font-size="10" fill="#A5D6A7">WRITE → STATUS 22</text>
  <line x1="155" y1="197" x2="200" y2="175" stroke="#4CAF50" stroke-width="1"/>

  <!-- REWRITE (derecha) -->
  <rect x="430" y="180" width="130" height="35" rx="5" fill="#E65100" stroke="#EF6C00" stroke-width="1"/>
  <text x="495" y="200" text-anchor="middle" font-size="10" fill="#FFCC80">REWRITE registro</text>
  <line x1="430" y1="197" x2="380" y2="175" stroke="#EF6C00" stroke-width="1"/>

  <!-- DELETE (abajo) -->
  <rect x="200" y="215" width="180" height="35" rx="5" fill="#B71C1C" stroke="#C62828" stroke-width="1"/>
  <text x="290" y="237" text-anchor="middle" font-size="10" fill="#EF9A9A">DELETE RECORD</text>
  <line x1="290" y1="180" x2="290" y2="215" stroke="#C62828" stroke-width="1.5"/>

  <!-- FLAGS -->
  <rect x="30" y="265" width="520" height="32" rx="6" fill="#1A2332" stroke="#263238" stroke-width="1"/>
  <text x="290" y="286" text-anchor="middle" font-size="10" fill="#78909C">
    FILE STATUS: 00=OK | 10=EOF | 22=Clave duplicada | 23=No encontrado | OPEN I-O requerido para REWRITE/DELETE
  </text>
</svg>
