<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" fill="none">
  <defs><style>text { font-family: Inter, Roboto, sans-serif; }</style></defs>
  <rect width="600" height="310" fill="#0D1B2A"/>

  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#42A5F5">OCCURS — TABLAS EN COBOL</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#78909C">Arrays 1D, 2D y métodos de búsqueda</text>

  <!-- Tabla 1D -->
  <rect x="25" y="70" width="175" height="155" rx="8" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="112" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#42A5F5">Tabla 1D</text>
  <rect x="40" y="100" width="145" height="22" rx="3" fill="#263238"/>
  <text x="112" y="115" text-anchor="middle" font-size="9" fill="#90CAF9">TASA(1) = 5.00</text>
  <rect x="40" y="125" width="145" height="22" rx="3" fill="#263238"/>
  <text x="112" y="140" text-anchor="middle" font-size="9" fill="#90CAF9">TASA(2) = 7.50</text>
  <rect x="40" y="150" width="145" height="22" rx="3" fill="#263238"/>
  <text x="112" y="165" text-anchor="middle" font-size="9" fill="#90CAF9">TASA(3) = 9.00</text>
  <rect x="40" y="175" width="145" height="22" rx="3" fill="#263238"/>
  <text x="112" y="190" text-anchor="middle" font-size="9" fill="#90CAF9">TASA(4) = 10.50</text>
  <text x="112" y="217" text-anchor="middle" font-size="9" fill="#78909C">OCCURS 4 TIMES</text>

  <!-- Tabla 2D -->
  <rect x="215" y="70" width="175" height="155" rx="8" fill="#1A237E" stroke="#1565C0" stroke-width="2"/>
  <text x="302" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#42A5F5">Tabla 2D</text>
  <rect x="230" y="100" width="145" height="40" rx="3" fill="#263238"/>
  <text x="302" y="116" text-anchor="middle" font-size="8" fill="#90CAF9">[1,1] [1,2] [1,3]</text>
  <text x="302" y="130" text-anchor="middle" font-size="8" fill="#78909C">Fila 1</text>
  <rect x="230" y="143" width="145" height="40" rx="3" fill="#263238"/>
  <text x="302" y="159" text-anchor="middle" font-size="8" fill="#90CAF9">[2,1] [2,2] [2,3]</text>
  <text x="302" y="173" text-anchor="middle" font-size="8" fill="#78909C">Fila 2</text>
  <text x="302" y="217" text-anchor="middle" font-size="9" fill="#78909C">OCCURS 2 × 3 anidados</text>

  <!-- Métodos de búsqueda -->
  <rect x="405" y="70" width="170" height="155" rx="8" fill="#263238" stroke="#37474F" stroke-width="1"/>
  <text x="490" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#42A5F5">Búsqueda</text>
  <text x="490" y="115" text-anchor="middle" font-size="10" fill="#90CAF9">SEARCH — secuencial</text>
  <text x="490" y="132" text-anchor="middle" font-size="8" fill="#78909C">O(n) · No requiere orden</text>
  <line x1="420" y1="143" x2="560" y2="143" stroke="#37474F" stroke-width="0.5"/>
  <text x="490" y="160" text-anchor="middle" font-size="10" fill="#FFAB40">SEARCH ALL — binaria</text>
  <text x="490" y="177" text-anchor="middle" font-size="8" fill="#78909C">O(log n) · ASCENDING KEY</text>
  <line x1="420" y1="188" x2="560" y2="188" stroke="#37474F" stroke-width="0.5"/>
  <text x="490" y="205" text-anchor="middle" font-size="9" fill="#78909C">PERFORM VARYING</text>
  <text x="490" y="220" text-anchor="middle" font-size="8" fill="#78909C">Recorrido completo</text>

  <!-- Pie -->
  <rect x="25" y="250" width="550" height="45" rx="6" fill="#1A2332" stroke="#263238" stroke-width="1"/>
  <text x="300" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#42A5F5">REGLAS</text>
  <text x="300" y="285" text-anchor="middle" font-size="10" fill="#78909C">
    No OCCURS en 01 · No VALUE en tablas · INDEXED BY obligatorio para SEARCH · ASCENDING KEY para SEARCH ALL
  </text>
</svg>
