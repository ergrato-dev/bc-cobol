<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" fill="none">
  <defs><style>text { font-family: Inter, Roboto, sans-serif; }</style></defs>
  <rect width="600" height="320" fill="#0D1B2A"/>

  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#42A5F5">ARQUITECTURA MODULAR — CALL + COPYBOOK</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#78909C">Programa principal → Subprogramas · COPYBOOKS compartidos</text>

  <!-- Programa Principal (centro) -->
  <rect x="215" y="75" width="170" height="55" rx="8" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">BANCO</text>
  <text x="300" y="120" text-anchor="middle" font-size="10" fill="#90A4AE">Programa Principal</text>

  <!-- COPYBOOKS (arriba) -->
  <rect x="30" y="60" width="140" height="40" rx="6" fill="#1A237E" stroke="#283593" stroke-width="1.5"/>
  <text x="100" y="85" text-anchor="middle" font-size="11" fill="#90CAF9">cuentas.cpy</text>
  <rect x="430" y="60" width="140" height="40" rx="6" fill="#1A237E" stroke="#283593" stroke-width="1.5"/>
  <text x="500" y="85" text-anchor="middle" font-size="11" fill="#90CAF9">errores.cpy</text>

  <line x1="170" y1="80" x2="215" y2="90" stroke="#1565C0" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="430" y1="80" x2="385" y2="90" stroke="#1565C0" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Subprogramas -->
  <rect x="30" y="175" width="155" height="55" rx="6" fill="#1B5E20" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="107" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#A5D6A7">CONSULTAR</text>
  <text x="107" y="218" text-anchor="middle" font-size="9" fill="#81C784">CALL "CONSULTAR" USING</text>
  <line x1="250" y1="130" x2="107" y2="205" stroke="#4CAF50" stroke-width="1"/>

  <rect x="222" y="175" width="155" height="55" rx="6" fill="#1B5E20" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="300" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#A5D6A7">DEPOSITAR</text>
  <text x="300" y="218" text-anchor="middle" font-size="9" fill="#81C784">BY REFERENCE LK-CUENTA</text>
  <line x1="300" y1="130" x2="300" y2="175" stroke="#4CAF50" stroke-width="1"/>

  <rect x="415" y="175" width="155" height="55" rx="6" fill="#1B5E20" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="492" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#A5D6A7">RETIRAR</text>
  <text x="492" y="218" text-anchor="middle" font-size="9" fill="#81C784">By REFERENCE LK-MONTO</text>
  <line x1="350" y1="130" x2="492" y2="205" stroke="#4CAF50" stroke-width="1"/>

  <!-- Pie -->
  <rect x="30" y="260" width="540" height="45" rx="6" fill="#1A2332" stroke="#263238" stroke-width="1"/>
  <text x="300" y="280" text-anchor="middle" font-size="10" fill="#78909C">
    COPYBOOK = Estructuras compartidas &nbsp;|&nbsp; LINKAGE SECTION = Parámetros &nbsp;|&nbsp; CALL USING = Invocación
  </text>
  <text x="300" y="296" text-anchor="middle" font-size="9" fill="#546E7A">BY REFERENCE (modifica) · BY CONTENT (solo lectura) · EXIT PROGRAM (retorna)</text>
</svg>
