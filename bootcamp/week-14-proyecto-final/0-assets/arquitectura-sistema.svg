<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 310" fill="none">
  <defs><style>text { font-family: Inter, Roboto, sans-serif; }</style></defs>
  <rect width="600" height="310" fill="#0D1B2A"/>

  <text x="300" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#42A5F5">SISTEMA BANCARIO — PROYECTO FINAL</text>
  <text x="300" y="44" text-anchor="middle" font-size="11" fill="#78909C">Batch (nocturno) + Online (diurno) + PostgreSQL</text>

  <!-- Módulo Batch -->
  <rect x="15" y="65" width="280" height="120" rx="8" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="155" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#42A5F5">MODULO BATCH</text>
  <text x="25" y="110" font-size="9" fill="#90CAF9">STEP1: validar.cbl</text>
  <text x="25" y="126" font-size="9" fill="#78909C">UNSTRING |, validar tipo y monto</text>
  <text x="25" y="146" font-size="9" fill="#90CAF9">STEP2: sort (Linux)</text>
  <text x="25" y="162" font-size="9" fill="#78909C">Ordenar por cuenta</text>
  <text x="25" y="178" font-size="9" fill="#90CAF9">STEP3-4: actualizar + reporte</text>
  <text x="25" y="194" font-size="9" fill="#78909C">Archivo indexado, break control</text>

  <!-- Módulo Online -->
  <rect x="310" y="65" width="275" height="120" rx="8" fill="#1A237E" stroke="#283593" stroke-width="2"/>
  <text x="447" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#42A5F5">MODULO ONLINE</text>
  <text x="320" y="110" font-size="9" fill="#90CAF9">Pantalla MENU</text>
  <text x="320" y="126" font-size="9" fill="#78909C">1=Consultar 2=SQL 9=Salir</text>
  <text x="320" y="146" font-size="9" fill="#90CAF9">Pantalla CONSULTA</text>
  <text x="320" y="162" font-size="9" fill="#78909C">Ingresar numero de cuenta</text>
  <text x="320" y="178" font-size="9" fill="#90CAF9">Pantalla RESULTADO</text>
  <text x="320" y="194" font-size="9" fill="#78909C">READ cuentas.idx, mostrar saldo</text>

  <!-- COPYBOOKS + DB -->
  <rect x="15" y="205" width="180" height="55" rx="6" fill="#1A2332" stroke="#263238" stroke-width="1"/>
  <text x="105" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#90CAF9">COPYBOOKS</text>
  <text x="105" y="245" text-anchor="middle" font-size="9" fill="#78909C">cuentas · transacc · errores · fechas</text>

  <rect x="210" y="205" width="180" height="55" rx="6" fill="#1A2332" stroke="#263238" stroke-width="1"/>
  <text x="300" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#90CAF9">ARCHIVOS</text>
  <text x="300" y="245" text-anchor="middle" font-size="9" fill="#78909C">cuentas.idx · transacciones.dat</text>

  <rect x="405" y="205" width="180" height="55" rx="6" fill="#1A2332" stroke="#263238" stroke-width="1"/>
  <text x="495" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#90CAF9">PostgreSQL</text>
  <text x="495" y="245" text-anchor="middle" font-size="9" fill="#78909C">CLIENTES · CUENTAS · TRANSACCIONES</text>

  <!-- Orquestación -->
  <rect x="15" y="275" width="570" height="25" rx="5" fill="#263238" stroke="#37474F" stroke-width="1"/>
  <text x="300" y="293" text-anchor="middle" font-size="10" fill="#78909C">batch.sh orquesta los 4 steps · test.sh verifica integracion · COMMAREA simulada para online</text>
</svg>
